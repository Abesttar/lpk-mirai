<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - LPK Mirai Crown Indonesia</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

  <!-- ICON -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <style>

    /* BACKGROUND */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('assets/contact-bg.jpg') center/cover no-repeat;
      filter: blur(8px);
      transform: scale(1.1);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(13,71,161,0.7),
        rgba(211,47,47,0.6),
        rgba(251,192,45,0.3)
      );
      z-index: -1;
    }

    /* HERO */
    .contact-hero {
      padding: 160px 20px 60px;
      text-align: center;
      color: white;
    }

    .contact-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 52px;
    }

    .contact-hero span {
      color: #fbc02d;
    }

    .contact-hero p {
      margin-top: 10px;
      font-size: 18px;
      opacity: 0.9;
    }

    /* SECTION */
    .section {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      margin: 40px auto;
      padding: 60px 20px;
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* GRID */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap: 25px;
      max-width: 900px;
      margin: auto;
    }

    /* CARD */
    .contact-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      transition: 0.3s;
      text-decoration: none;
      color: #222;
      position: relative;
      overflow: hidden;
    }

    .contact-card:hover {
      transform: translateY(-8px) scale(1.03);
    }

    .contact-icon {
      font-size: 32px;
      margin-bottom: 15px;
    }

    .contact-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-bottom: 5px;
    }

    .contact-card p {
      font-size: 14px;
      color: #555;
    }

    /* BRAND COLORS */
    .wa { color: #25D366; }
    .ig { color: #E1306C; }
    .tt { color: #000; }
    .mail { color: #d32f2f; }

    .contact-card::before {
      content: "";
      position: absolute;
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.3);
      top: -30px;
      right: -30px;
      border-radius: 50%;
    }

  </style>
</head>
<body>

<header class="navbar">
  <div class="container nav-wrapper">
    <img src="assets/logo.png" class="logo">
    <ul>
      <li><a href="index.html">Home</a></li>

      <li><a href="program.html">Program</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="testimoni.html">Testimoni</a></li>
      <li><a href="faq.html">FAQ</a></li>
      <li><a href="contact.html" class="nav-btn">Daftar</a></li>
    </ul>
  </div>
</header>

<!-- HERO -->
<section class="contact-hero">
  <h1>Hubungi <span>Kami</span></h1>
  <p>Kami siap membantu perjalanan karir kamu ke Jepang</p>
</section>

<!-- CONTACT -->
<section class="section">
  <div class="contact-grid">

    <!-- WHATSAPP (ISI NANTI) -->
    <a href="#" class="contact-card">
      <div class="contact-icon wa"><i class="fab fa-whatsapp"></i></div>
      <h3>WhatsApp</h3>
      <p>Segera hadir</p>
    </a>

    <!-- INSTAGRAM -->
    <a href="https://www.instagram.com/lpkmiraicrown.indonesia?igsh=MWR6cmgweTV6MThmeA==" target="_blank" class="contact-card">
      <div class="contact-icon ig"><i class="fab fa-instagram"></i></div>
      <h3>Instagram</h3>
      <p>@lpkmiraicrown.indonesia</p>
    </a>

    <!-- TIKTOK -->
    <a href="https://www.tiktok.com/@lpkmiraicrown_indonesia?_r=1&_t=ZS-95AK91GjADB" target="_blank" class="contact-card">
      <div class="contact-icon tt"><i class="fab fa-tiktok"></i></div>
      <h3>TikTok</h3>
      <p>@lpkmiraicrown_indonesia</p>
    </a>

    <!-- EMAIL -->

      <h3>Email</h3>
      <p>Miraicrownina@gmail.com</p>
    </a>

  </div>
</section>

</body>
</html>
