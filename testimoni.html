<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimoni - LPK Mirai Crown Indonesia</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <style>

    /* ================= BACKGROUND ================= */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('assets/testimoni-bg.jpg') center/cover no-repeat;
      filter: blur(8px);
      transform: scale(1.1);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(13,71,161,0.6),
        rgba(211,47,47,0.6),
        rgba(251,192,45,0.3)
      );
      z-index: -1;
    }

    /* ================= CENTER ================= */
    .coming-wrapper {
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    /* ================= BOX ================= */
    .coming-box {
      backdrop-filter: blur(14px);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 55px 45px;
      border-radius: 25px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.4);
      max-width: 650px;
      animation: fadeUp 1s ease;
    }

    /* ================= TITLE ================= */
    .coming-box h1 {
      font-family: 'Playfair Display', serif;
      font-size: 60px;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .coming-box h1 span {
      color: #fbc02d;
    }

    /* ================= TEXT ================= */
    .coming-box p {
      font-size: 18px;
      opacity: 0.95;
      margin-top: 10px;
      line-height: 1.7;
    }

    .coming-note {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.75;
      font-style: italic;
    }

    /* ================= ANIMATION ================= */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>
<body>

<header class="navbar">
  <div class="container nav-wrapper">
    <img src="assets/logo.png" class="logo">

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="program.html">Program</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="testimoni.html">Testimoni</a></li>
      <li><a href="faq.html">FAQ</a></li>
      <li><a href="contact.html" class="nav-btn">Daftar</a></li>
    </ul>
  </div>
</header>

<!-- CONTENT -->
<section class="coming-wrapper">
  <div class="coming-box">

    <h1>Testimoni <span>Soon</span></h1>

    <p>
      Kami sedang menyiapkan <b>testimoni nyata dari alumni</b> 
      yang telah berhasil bekerja di Jepang melalui program kami.
    </p>

    <div class="coming-note">
      Real stories. Real journey. Real success ✨
    </div>

  </div>
</section>

</body>
</html>
